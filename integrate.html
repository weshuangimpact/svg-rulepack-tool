<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVG 規則整合 · 打包 .img</title>
<style>
  :root{--bg:#f4f4f2;--card:#fff;--ink:#1a1a18;--muted:#6b6b66;--line:#dcdcd6;
    --accent:#b8862f;--ok:#1d7a53;--ok-bg:#e3f3ec;--bad:#b3382f;
    --mono:'SFMono-Regular',Consolas,Menlo,monospace;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,'Segoe UI','Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;}
  .wrap{max-width:920px;margin:0 auto;padding:24px 20px 80px;}
  h1{font-size:24px;font-weight:700;margin:0 0 4px;}
  .sub{color:var(--muted);font-size:14px;margin-bottom:24px;}
  .step{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:18px 20px;margin-bottom:16px;}
  .step-h{display:flex;align-items:center;gap:8px;font-weight:600;font-size:15px;margin-bottom:12px;}
  .num{background:var(--accent);color:#fff;width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px;flex:none;}
  button{font-family:inherit;font-size:14px;border:1px solid var(--accent);background:var(--accent);color:#fff;border-radius:6px;padding:9px 16px;cursor:pointer;font-weight:500;}
  button.ghost{background:#fff;color:var(--accent);}
  button:disabled{opacity:.4;cursor:not-allowed;}
  table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px;}
  th,td{text-align:left;padding:7px 8px;border-bottom:1px solid var(--line);}
  th{color:var(--muted);font-weight:500;font-size:11px;}
  td.mono,th.mono{font-family:var(--mono);}
  .hint{font-size:12px;color:var(--muted);margin-top:8px;}
  .ok{font-size:13px;color:var(--ok);margin-top:8px;font-weight:500;}
  .bad{font-size:13px;color:var(--bad);margin-top:8px;}
  code{font-family:var(--mono);background:#efefe9;padding:1px 5px;border-radius:3px;font-size:12px;}
  .bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:12px;}
  .navlink{font-size:13px;color:var(--accent);text-decoration:none;border:1px solid var(--accent);padding:6px 12px;border-radius:6px;}
  pre{font-family:var(--mono);font-size:11px;background:#1a1a18;color:#e3f3ec;padding:12px;border-radius:8px;overflow:auto;max-height:260px;}
</style>
</head>
<body>
<div class="wrap">
  <h1>SVG 規則整合 · 打包 rulepack.img</h1>
  <div class="sub">上傳多個 <code>.hex</code>（規則產生器產出）→ 合併 → 組 SVGR header + SHA-256 → 匯出可燒錄 <code>.img</code><br>
    <span style="font-size:12px;">純瀏覽器離線運作,不需伺服器。格式對齊 SVG_Boot_Loader（MAGIC=SVGR, VERSION=0x00080001）。</span>
    <a class="navlink" href="index.html" style="margin-left:8px;">← 回規則產生器</a>
  </div>

  <div class="step">
    <div class="step-h"><span class="num">1</span> 上傳 config .hex（可多檔）</div>
    <input type="file" id="files" accept=".hex,.txt" multiple style="font-size:13px;margin-bottom:10px;">
    <div class="hint">每個 .hex 為一行一個 8 位 16 進位 config word。多檔會依序合併。</div>
    <div id="fileList"></div>
  </div>

  <div class="step" id="s2" style="display:none;">
    <div class="step-h"><span class="num">2</span> 合併結果</div>
    <div id="mergeOut"></div>
    <div class="bar"><button id="btnPack">產生 rulepack.img</button></div>
  </div>

  <div class="step" id="s3" style="display:none;">
    <div class="step-h"><span class="num">3</span> .img 產出</div>
    <div id="packOut"></div>
  </div>
</div>

<script>
// ===== 內嵌 SHA-256(純 JS,不依賴 crypto.subtle,避免 file:// 限制)=====
// 標準 SHA-256 實作
function sha256bytes(bytes){
  function rotr(n,x){return (x>>>n)|(x<<(32-n));}
  var K=[0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
  0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
  0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
  0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
  0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
  0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
  0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
  0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
  var H=[0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
  var l=bytes.length; var withOne=l+1;
  var k=(56-withOne%64+64)%64;
  var total=withOne+k+8;
  var m=new Uint8Array(total); m.set(bytes); m[l]=0x80;
  var bitLen=l*8;
  // 64-bit length big-endian (high 32 assumed 0 for our sizes)
  m[total-4]=(bitLen>>>24)&0xff; m[total-3]=(bitLen>>>16)&0xff; m[total-2]=(bitLen>>>8)&0xff; m[total-1]=bitLen&0xff;
  var w=new Array(64);
  for(var i=0;i<total;i+=64){
    for(var t=0;t<16;t++) w[t]=(m[i+t*4]<<24)|(m[i+t*4+1]<<16)|(m[i+t*4+2]<<8)|(m[i+t*4+3]);
    for(t=16;t<64;t++){
      var s0=rotr(7,w[t-15])^rotr(18,w[t-15])^(w[t-15]>>>3);
      var s1=rotr(17,w[t-2])^rotr(19,w[t-2])^(w[t-2]>>>10);
      w[t]=(w[t-16]+s0+w[t-7]+s1)|0;
    }
    var a=H[0],b=H[1],c=H[2],d=H[3],e=H[4],f=H[5],g=H[6],h=H[7];
    for(t=0;t<64;t++){
      var S1=rotr(6,e)^rotr(11,e)^rotr(25,e);
      var ch=(e&f)^((~e)&g);
      var t1=(h+S1+ch+K[t]+w[t])|0;
      var S0=rotr(2,a)^rotr(13,a)^rotr(22,a);
      var maj=(a&b)^(a&c)^(b&c);
      var t2=(S0+maj)|0;
      h=g;g=f;f=e;e=(d+t1)|0;d=c;c=b;b=a;a=(t1+t2)|0;
    }
    H[0]=(H[0]+a)|0;H[1]=(H[1]+b)|0;H[2]=(H[2]+c)|0;H[3]=(H[3]+d)|0;
    H[4]=(H[4]+e)|0;H[5]=(H[5]+f)|0;H[6]=(H[6]+g)|0;H[7]=(H[7]+h)|0;
  }
  var out=new Uint8Array(32);
  for(i=0;i<8;i++){out[i*4]=(H[i]>>>24)&0xff;out[i*4+1]=(H[i]>>>16)&0xff;out[i*4+2]=(H[i]>>>8)&0xff;out[i*4+3]=H[i]&0xff;}
  return out;
}
function hex(bytes){return Array.from(bytes).map(function(b){return ("0"+b.toString(16)).slice(-2).toUpperCase();}).join("");}

var WORDS=[]; // 合併後的 config words (整數)
document.getElementById("files").addEventListener("change",function(e){
  var files=Array.from(e.target.files); if(!files.length)return;
  WORDS=[]; var listHtml=""; var pending=files.length;
  files.forEach(function(f,idx){
    var r=new FileReader();
    r.onload=function(){
      var lines=r.result.split(/\r?\n/).filter(function(l){return l.trim();});
      var cnt=0;
      lines.forEach(function(l){
        var t=l.trim();
        if(/^[0-9a-fA-F]{1,8}$/.test(t)){ WORDS.push(parseInt(t,16)>>>0); cnt++; }
      });
      listHtml+="<div class='hint'>• "+f.name+" → "+cnt+" words</div>";
      pending--;
      if(pending===0){ document.getElementById("fileList").innerHTML=listHtml; showMerge(); }
    };
    r.readAsText(f);
  });
});

function showMerge(){
  var out=document.getElementById("mergeOut");
  if(WORDS.length>128){
    out.innerHTML="<div class='bad'>✗ 合併後 "+WORDS.length+" 條規則,超過 body 上限 128 條(512 bytes)。請減少規則。</div>";
    document.getElementById("s2").style.display="block"; return;
  }
  var h="<div class='ok'>✓ 合併 "+WORDS.length+" 條規則(上限 128)。</div>";
  h+="<table><tr><th>#</th><th class='mono'>config word</th><th>op</th><th>field</th><th>id</th><th>thresh</th></tr>";
  WORDS.forEach(function(w,i){
    var op=(w>>>28)&0xF,fld=(w>>>25)&0x7,id=(w>>>16)&0x1FF,thr=w&0xFFFF;
    var opn=op===1?"LE":op===2?"GE":op===3?"EQ":op===15?"ANY":op===0?"DIS":("?"+op);
    h+="<tr><td>"+(i+1)+"</td><td class='mono'>"+("00000000"+w.toString(16).toUpperCase()).slice(-8)+"</td><td>"+opn+"</td><td>"+fld+"</td><td>"+id+"</td><td>"+thr+"</td></tr>";
  });
  h+="</table>";
  out.innerHTML=h;
  document.getElementById("s2").style.display="block";
}

function buildImg(){
  // Header 512 bytes
  var header=new Uint8Array(512);
  // MAGIC 0x53565752 "SVGR" big-endian at offset 0
  header[0]=0x53;header[1]=0x56;header[2]=0x47;header[3]=0x52;
  // VERSION 0x00080001 big-endian at offset 4
  header[4]=0x00;header[5]=0x08;header[6]=0x00;header[7]=0x01;
  // RULECOUNT at offset 8, little-endian 32-bit
  var rc=WORDS.length;
  header[8]=rc&0xff;header[9]=(rc>>>8)&0xff;header[10]=(rc>>>16)&0xff;header[11]=(rc>>>24)&0xff;
  // Body 512 bytes = 128 words big-endian
  var body=new Uint8Array(512);
  for(var i=0;i<WORDS.length;i++){
    var w=WORDS[i];
    body[i*4]=(w>>>24)&0xff;body[i*4+1]=(w>>>16)&0xff;body[i*4+2]=(w>>>8)&0xff;body[i*4+3]=w&0xff;
  }
  // SHA-256 over body, write to header offset 16..47
  var digest=sha256bytes(body);
  header.set(digest,16);
  // Full img: sector0 reserved(512) + header(512@LBA1) + body(512@LBA2)
  var img=new Uint8Array(512*3);
  img.set(header,512);
  img.set(body,1024);
  return {img:img,digest:digest,rc:rc};
}

document.getElementById("btnPack").addEventListener("click",function(){
  if(!WORDS.length){alert("請先上傳 .hex");return;}
  if(WORDS.length>128){alert("規則超過 128 條");return;}
  var r=buildImg();
  var out=document.getElementById("packOut");
  var h="<div class='ok'>✓ rulepack.img 已產生（1536 bytes = 保留512 + Header512 + Body512）</div>";
  h+="<table>"+
     "<tr><td>MAGIC</td><td class='mono'>53 56 47 52 (\"SVGR\")</td></tr>"+
     "<tr><td>VERSION</td><td class='mono'>00 08 00 01</td></tr>"+
     "<tr><td>RULECOUNT</td><td class='mono'>"+r.rc+"</td></tr>"+
     "<tr><td>BODY SHA-256</td><td class='mono' style='font-size:10px;word-break:break-all;'>"+hex(r.digest)+"</td></tr>"+
     "</table>";
  h+="<div class='bar'><button class='ghost' id='btnDlImg'>下載 rulepack.img</button></div>";
  out.innerHTML=h;
  document.getElementById("s3").style.display="block";
  document.getElementById("btnDlImg").addEventListener("click",function(){
    var blob=new Blob([r.img],{type:"application/octet-stream"});
    var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="rulepack.img";a.click();
  });
});
</script>
</body>
</html>
